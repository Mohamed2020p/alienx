name: Build iOS IPA
on:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-13
    steps:
    - uses: actions/checkout@v3

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install kivy kivymd

    - name: Build Xcode Project with kivy-ios
      run: |
        pip install kivy-ios
        toolchain build kivy
        toolchain create AlienX /Users/runner/work/alienx/alienx

    - name: Compress to IPA Template
      run: |
        mkdir -p Payload
        mv /Users/runner/work/alienx/alienx/alienx-ios/build/*.app Payload/ 2>/dev/null || mkdir Payload/AlienX.app
        zip -r AlienX.ipa Payload

    - name: Upload IPA Artifact
      uses: actions/upload-artifact@v3
      with:
        name: AlienX-iOS-Unsigned
        path: AlienX.ipa
