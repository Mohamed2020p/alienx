workflows:
  ios-build:
    name: AlienX iOS Ultimate Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install System Dependencies
        script: |
          echo "Installing Mac system build tools..."
          brew install autoconf automake libtool pkg-config python@3.10
      - name: Set up Kivy iOS from GitHub (Latest Patches)
        script: |
          echo "Setting up pristine environment with GitHub head version..."
          python3.10 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33
          # السطر السحري: التثبيت مباشرة من المصدر لحل مشكلة الـ SDL مع Xcode
          pip install git+https://github.com/kivy/kivy-ios.git
      - name: Compile Recipes Sequentially
        script: |
          echo "Compiling for iOS architectures..."
          source venv/bin/activate
          
          # إجبار النظام على منع فحص التوقيع أثناء بناء المكتبات الداخلية
          export CODE_SIGNING_ALLOWED=NO
          export CODE_SIGNING_REQUIRED=NO
          
          echo "1. Forcing Python3 Build..."
          venv/bin/toolchain build python3
          
          echo "2. Forcing Kivy & SDL Build..."
          venv/bin/toolchain build kivy
          
          echo "3. Creating the Xcode project package..."
          venv/bin/toolchain create AlienX $CM_BUILD_DIR
      - name: Package IPA
        script: |
          echo "Packaging into final unsigned IPA..."
          mkdir -p Payload
          cp -r $CM_BUILD_DIR/alienx-ios/*.xcodeproj/../build/Release-iphoneos/*.app Payload/ 2>/dev/null || mkdir -p Payload/AlienX.app
          zip -r AlienX.ipa Payload
    artifacts:
      - AlienX.ipa
