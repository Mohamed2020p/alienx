workflows:
  ios-build:
    name: AlienX iOS Ultimate Build
    max_build_duration: 120
    instance_type: mac_mini_m1

    scripts:
      - name: Install System Dependencies
        script: |
          brew install autoconf automake libtool pkg-config python@3.10
          brew install cmake ninja ccache

      - name: Set up Kivy iOS
        script: |
          python3.10 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33
          # 2025.5.17 هو الإصدار الوحيد المتوافق مع M1 + darwin25 + Xcode 26
          pip install kivy-ios==2025.5.17

      - name: Build Python3 Only
        script: |
          source venv/bin/activate
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          export XCODE_XCCONFIG_FILE=""
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          export ARCHFLAGS="-arch arm64"
          export KIVY_IOS_ARCH="arm64"
          # تنظيف كامل قبل البناء
          venv/bin/toolchain clean
          venv/bin/toolchain build python3

      - name: Build SDL2 Only
        script: |
          source venv/bin/activate
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          export XCODE_XCCONFIG_FILE=""
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          export ARCHFLAGS="-arch arm64"
          export KIVY_IOS_ARCH="arm64"
          # SDL2 لازم يتبنى منفصل قبل Kivy على Xcode 26
          venv/bin/toolchain build sdl2
          venv/bin/toolchain build sdl2_image
          venv/bin/toolchain build sdl2_mixer
          venv/bin/toolchain build sdl2_ttf

      - name: Build Kivy Only
        script: |
          source venv/bin/activate
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          export XCODE_XCCONFIG_FILE=""
          export CFLAGS="-w"
          export CXXFLAGS="-w"
          export ARCHFLAGS="-arch arm64"
          export KIVY_IOS_ARCH="arm64"
          venv/bin/toolchain build kivy

      - name: Build KivyMD and Python dependencies
        script: |
          source venv/bin/activate
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          export CFLAGS="-w"
          export ARCHFLAGS="-arch arm64"
          # مكتبات Python الضرورية للتطبيق
          venv/bin/toolchain pip install kivymd
          venv/bin/toolchain pip install requests

      - name: Create Xcode Project
        script: |
          source venv/bin/activate
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          export ARCHFLAGS="-arch arm64"
          venv/bin/toolchain create AlienX $CM_BUILD_DIR

      - name: Compile Xcode Project to APP
        script: |
          cd $CM_BUILD_DIR/alienx-ios
          xcodebuild \
            -project alienx.xcodeproj \
            -scheme alienx \
            -configuration Release \
            -sdk iphoneos \
            -arch arm64 \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            ONLY_ACTIVE_ARCH=NO \
            clean build

      - name: Package IPA
        script: |
          cd $CM_BUILD_DIR
          mkdir -p Payload
          APP_PATH=$(find . -name "*.app" -type d | grep -v simulator | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found!"
            find . -name "*.app" -type d
            exit 1
          fi
          echo "Found app: $APP_PATH"
          cp -r "$APP_PATH" Payload/
          zip -r AlienX.ipa Payload
          echo "IPA size: $(du -sh AlienX.ipa)"

    artifacts:
      - AlienX.ipa
      - $CM_BUILD_DIR/alienx-ios/build/**/*.log
