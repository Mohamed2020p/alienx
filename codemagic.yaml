workflows:
  ios-build:
    name: AlienX iOS Ultimate Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install System Dependencies
        script: |
          brew install autoconf automake libtool pkg-config python@3.10
      - name: Set up Kivy iOS
        script: |
          python3.10 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33
          pip install git+https://github.com/kivy/kivy-ios.git
      - name: Build Python3 Only
        script: |
          echo "Forcing Python3 Build strictly..."
          source venv/bin/activate
          venv/bin/toolchain clean
          venv/bin/toolchain build python3
      - name: Build Kivy Only
        script: |
          echo "Forcing Kivy and SDL Build with Warning Bypass..."
          source venv/bin/activate
          # سطر سحري لإجبار Xcode على تمرير كود SDL القديم بدون اعتراض
          export CFLAGS="-w"
          venv/bin/toolchain build kivy
      - name: Create Xcode Project
        script: |
          source venv/bin/activate
          venv/bin/toolchain create AlienX $CM_BUILD_DIR
      - name: Compile Xcode Project to APP
        script: |
          cd $CM_BUILD_DIR/alienx-ios
          xcodebuild -project alienx.xcodeproj -scheme alienx -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER="" clean build
      - name: Package IPA
        script: |
          cd $CM_BUILD_DIR
          mkdir -p Payload
          APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          cp -r "$APP_PATH" Payload/
          zip -r AlienX.ipa Payload
    artifacts:
      - AlienX.ipa
