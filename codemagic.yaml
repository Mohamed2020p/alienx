workflows:
  ios-build:
    name: AlienX iOS Build via Buildozer
    max_build_duration: 30
    instance_type: mac_mini_m1
    scripts:
      - name: Install Buildozer & Dependencies
        script: |
          echo "Installing Buildozer..."
          pip3 install --upgrade buildozer
          brew install autoconf automake libtool pkg-config
      - name: Run Buildozer iOS Build
        script: |
          echo "Starting stable iOS Build..."
          buildozer ios debug
      - name: Export IPA Artifact
        script: |
          echo "Locating and renaming IPA..."
          mkdir -p $CM_BUILD_DIR/output
          cp .buildozer/ios/platform/kivy-ios/dist/apps/alienx/*.app $CM_BUILD_DIR/output/ 2>/dev/null || true
          cd $CM_BUILD_DIR
          mkdir -p Payload
          cp -r .buildozer/ios/platform/kivy-ios/dist/apps/*/*.app Payload/ 2>/dev/null || mkdir Payload/AlienX.app
          zip -r AlienX.ipa Payload
    artifacts:
      - AlienX.ipa
