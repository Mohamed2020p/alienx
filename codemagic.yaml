workflows:
  ios-build:
    name: AlienX iOS Ultimate Build
    max_build_duration: 90
    instance_type: mac_mini_m1

    scripts:
      - name: Install System Dependencies
        script: |
          brew install autoconf automake libtool pkg-config python@3.10
          brew install cmake ninja

      - name: Set up Kivy iOS
        script: |
          python3.10 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33
          # kivy-ios 2.2.0 هو آخر إصدار مستقر ومتوافق مع Xcode الحديث
          pip install kivy-ios==2.2.0

      - name: Build Python3 Only
        script: |
          source venv/bin/activate
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          export XCODE_XCCONFIG_FILE=""
          export CFLAGS="-w"
          venv/bin/toolchain clean
          venv/bin/toolchain build python3

      - name: Build SDL2 Only
        script: |
          source venv/bin/activate
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          export XCODE_XCCONFIG_FILE=""
          export CFLAGS="-w"
          # بناء SDL2 منفصل ضروري لتجنب فشل Xcode 26.x
          venv/bin/toolchain build sdl2

      - name: Build Kivy Only
        script: |
          source venv/bin/activate
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          export XCODE_XCCONFIG_FILE=""
          export CFLAGS="-w"
          venv/bin/toolchain build kivy

      - name: Build KivyMD dependency (requests + urllib3)
        script: |
          source venv/bin/activate
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          export CFLAGS="-w"
          # بناء مكتبات Python الإضافية المطلوبة لـ KivyMD و URLRequest
          venv/bin/toolchain build requests
          venv/bin/toolchain build urllib3

      - name: Create Xcode Project
        script: |
          source venv/bin/activate
          export IPHONEOS_DEPLOYMENT_TARGET=13.0
          venv/bin/toolchain create AlienX $CM_BUILD_DIR

      - name: Compile Xcode Project to APP
        script: |
          cd $CM_BUILD_DIR/alienx-ios
          xcodebuild \
            -project alienx.xcodeproj \
            -scheme alienx \
            -configuration Release \
            -sdk iphoneos \
            IPHONEOS_DEPLOYMENT_TARGET=13.0 \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            PROVISIONING_PROFILE_SPECIFIER="" \
            clean build

      - name: Package IPA
        script: |
          cd $CM_BUILD_DIR
          mkdir -p Payload
          APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          if [ -z "$APP_PATH" ]; then
            echo "ERROR: No .app file found!"
            exit 1
          fi
          cp -r "$APP_PATH" Payload/
          zip -r AlienX.ipa Payload
          echo "IPA size: $(du -sh AlienX.ipa)"

    artifacts:
      - AlienX.ipa
      - $CM_BUILD_DIR/alienx-ios/build/**/*.log
