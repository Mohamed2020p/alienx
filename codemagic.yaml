workflows:
  ios-build:
    name: AlienX iOS Ultimate Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install System Dependencies
        script: |
          echo "Installing Mac system build tools..."
          brew install autoconf automake libtool pkg-config python@3.10
      - name: Set up Kivy iOS
        script: |
          echo "Setting up pristine Python environment..."
          python3.10 -m venv venv
          source venv/bin/activate
          pip install --upgrade pip setuptools wheel
          pip install Cython==0.29.33
          pip install git+https://github.com/kivy/kivy-ios.git
      - name: Build Recipes & Create Xcode Project
        script: |
          echo "Building Python3 and Kivy recipes..."
          source venv/bin/activate
          venv/bin/toolchain build python3 kivy
          
          echo "Creating Xcode project..."
          # إنشاء المشروع في مجلد مخصص ونظيف
          venv/bin/toolchain create AlienX $CM_BUILD_DIR
      - name: Compile Xcode Project to APP
        script: |
          echo "Compiling Xcode project via xcodebuild (No Code Sign)..."
          cd $CM_BUILD_DIR/alienx-ios
          # الأمر الحاسم لترجمة المشروع بالكامل وتحويله لتطبيق ايفون حقيقي
          xcodebuild -project alienx.xcodeproj -scheme alienx -configuration Release -sdk iphoneos CODE_SIGNING_ALLOWED=NO CODE_SIGNING_REQUIRED=NO CODE_SIGN_IDENTITY="" PROVISIONING_PROFILE_SPECIFIER="" clean build
      - name: Package IPA
        script: |
          echo "Packaging into final unsigned IPA..."
          cd $CM_BUILD_DIR
          mkdir -p Payload
          
          # البحث الديناميكي عن ملف الـ .app الناتج ونسخه داخل الـ Payload
          APP_PATH=$(find . -name "*.app" -type d | head -n 1)
          echo "Found compiled app at: $APP_PATH"
          
          if [ -z "$APP_PATH" ]; then
            echo "Error: .app file not found!"
            exit 1
          fi
          
          cp -r "$APP_PATH" Payload/
          zip -r AlienX.ipa Payload
    artifacts:
      - AlienX.ipa
