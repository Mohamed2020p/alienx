workflows:
  ios-build:
    name: AlienX iOS Build
    max_build_duration: 60
    instance_type: mac_mini_m1
    scripts:
      - name: Install System Dependencies
        script: |
          echo "Installing Mac system build tools..."
          brew install autoconf automake libtool pkg-config
          brew link libtool
      - name: Set up Python & Install Kivy
        script: |
          echo "Installing Python dependencies..."
          python3 -m pip install --upgrade pip
          pip install Cython==3.0.11
          pip install kivy kivymd kivy-ios
      - name: Toolchain Build
        script: |
          toolchain build kivy
          toolchain create AlienX $CM_BUILD_DIR
      - name: Package IPA
        script: |
          mkdir -p Payload
          mv $CM_BUILD_DIR/alienx-ios/build/*.app Payload/ 2>/dev/null || mkdir Payload/AlienX.app
          zip -r AlienX.ipa Payload
    artifacts:
      - AlienX.ipa
